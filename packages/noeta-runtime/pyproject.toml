[project]
name = "noeta-runtime"
version = "0.1.6"
description = "Noeta runtime engine: the event-sourced kernel that hosts, records, and schedules agent execution in-process. The durable substrate underneath the SDK and the coding agent app."
license = "Apache-2.0"
authors = [{ name = "The Noeta Authors" }]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx>=0.28.1",
    # [binary] bundles libpq so the Postgres storage adapters work out of
    # the box (the langchain-postgres / dbt pattern; the maintainer chose
    # zero-setup over the psycopg "libraries depend on bare psycopg" advice).
    "psycopg[binary]>=3.2",
]

[project.urls]
Homepage = "https://github.com/initxy/noeta"
Repository = "https://github.com/initxy/noeta"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Namespace-package distribution (PEP 420): ``noeta/`` has no ``__init__.py``;
# this wheel contributes the kernel subpackages to the shared ``noeta`` namespace.
[tool.hatch.build.targets.wheel]
packages = ["noeta"]
