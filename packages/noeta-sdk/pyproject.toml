[project]
name = "noeta-sdk"
version = "0.1.3"
description = "Noeta SDK: the thin in-process client surface (noeta.sdk facade — query / Client / Options / tool / extension interfaces) over the noeta-runtime engine. Like claude-agent-sdk / LangChain: import noeta.sdk, run an agent in-process; no engine internals, no HTTP."
license = "Apache-2.0"
authors = [{ name = "The Noeta Authors" }]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "noeta-runtime>=0.1.3",
]

[project.urls]
Homepage = "https://github.com/initxy/noeta"
Repository = "https://github.com/initxy/noeta"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["noeta"]

[tool.uv.sources]
noeta-runtime = { workspace = true }
