[project]
name = "noeta-sdk"
version = "0.1.17"
description = "Noeta SDK: build AI agents that run on the server. Import noeta.sdk, define your tools and policy — durable event-sourced execution, multi-worker scheduling, provider-neutral, no vendor lock-in."
license = "Apache-2.0"
authors = [{ name = "The Noeta Authors" }]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "noeta-runtime>=0.1.17",
]

[project.urls]
Homepage = "https://github.com/initxy/noeta"
Repository = "https://github.com/initxy/noeta"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["noeta"]

[tool.uv.sources]
noeta-runtime = { workspace = true }
