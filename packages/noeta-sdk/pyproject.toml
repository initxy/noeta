[project]
name = "noeta-sdk"
version = "0.1.10"
description = "Noeta SDK: the thin in-process client for building AI agents. Import noeta.sdk, define your tools and policy, and run — provider-neutral, event-sourced, no vendor lock-in. Like the Claude Agent SDK, but open-source and self-hostable."
license = "Apache-2.0"
authors = [{ name = "The Noeta Authors" }]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "noeta-runtime>=0.1.10",
]

[project.urls]
Homepage = "https://github.com/initxy/noeta"
Repository = "https://github.com/initxy/noeta"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["noeta"]

[tool.uv.sources]
noeta-runtime = { workspace = true }
