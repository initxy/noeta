        <path d="M 72 264 L 908 264" class="a-default" stroke-width="0.8" stroke-dasharray="3,8"/>
        <text x="72" y="252" class="t-dim" font-size="10" font-weight="600">02 / Suspended (unified waiting)</text>
        <path d="M 72 436 L 908 436" class="a-default" stroke-width="0.8" stroke-dasharray="3,8"/>
        <text x="72" y="424" class="t-dim" font-size="10" font-weight="600">03 / Terminal exits</text>

        <!-- Primary lifecycle rail -->
        <path d="M 154 157 L 594 157" class="a-emphasis" stroke-width="2.2" marker-end="url(#arrowhead-emphasis)"/>

        <!-- Transition paths -->
        <path d="M 153 157 L 471 157" class="a-emphasis" stroke-width="2" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 641 157 L 641 207.5 Q 641 217.5 651 217.5 L 700 217.5 Q 710 217.5 710 227.5 L 710 278" class="a-default" stroke-width="1.1" marker-end="url(#arrowhead)"/>
        <path d="M 798 307 L 820 307 Q 830 307 830 297 L 830 106 Q 830 96 820 96 L 566 96 Q 556 96 556 106 L 556 126" class="a-emphasis" stroke-width="2" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 556 188 L 556 400 Q 556 410 546 410 L 412 410 Q 402 410 402 420 L 402 450" class="a-emphasis" stroke-width="2" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 556 188 L 556 450" class="a-default" stroke-width="1.1" marker-end="url(#arrowhead)"/>
        <path d="M 710 336 L 710 450" class="a-default" stroke-width="1.1" marker-end="url(#arrowhead)"/>

        <!-- States -->
        <rect x="35" y="126" width="118" height="62" rx="7" class="c-mask"/>
        <rect x="35" y="126" width="118" height="62" rx="7" class="c-frontend" stroke-width="1.5"/>
        <text x="45" y="140" class="t-frontend" font-size="7" font-weight="700">01</text>
        <text x="94" y="147" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Queued</text>
        <text x="94" y="163" class="t-muted" font-size="7" text-anchor="middle">TaskCreated</text>
        <text x="94" y="177" class="t-frontend" font-size="7" text-anchor="middle">entry</text>

        <rect x="471" y="126" width="170" height="62" rx="7" class="c-mask"/>
        <rect x="471" y="126" width="170" height="62" rx="7" class="c-backend" stroke-width="1.5"/>
        <text x="481" y="140" class="t-backend" font-size="7" font-weight="700">02</text>
        <text x="556" y="147" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Running</text>
        <text x="556" y="163" class="t-muted" font-size="7" text-anchor="middle">compose · decide · dispatch</text>
        <text x="556" y="177" class="t-backend" font-size="7" text-anchor="middle">leased</text>

        <rect x="622" y="278" width="176" height="58" rx="7" class="c-mask"/>
        <rect x="622" y="278" width="176" height="58" rx="7" class="c-cloud" stroke-width="1.5"/>
        <text x="710" y="299" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Suspended</text>
        <text x="710" y="315" class="t-muted" font-size="7" text-anchor="middle">wake_on: sub · human · timer</text>

        <rect x="343" y="450" width="118" height="58" rx="7" class="c-mask"/>
        <rect x="343" y="450" width="118" height="58" rx="7" class="c-database" stroke-width="1.5"/>
        <text x="402" y="471" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Completed</text>
        <text x="402" y="487" class="t-muted" font-size="7" text-anchor="middle">finish Decision</text>
        <text x="402" y="497" class="t-database" font-size="7" text-anchor="middle">snapshot</text>

        <rect x="497" y="450" width="118" height="58" rx="7" class="c-mask"/>
        <rect x="497" y="450" width="118" height="58" rx="7" class="c-security" stroke-width="1.5"/>
        <text x="556" y="471" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Failed</text>
        <text x="556" y="487" class="t-muted" font-size="7" text-anchor="middle">fail · budget breach</text>

        <rect x="651" y="450" width="118" height="58" rx="7" class="c-mask"/>
        <rect x="651" y="450" width="118" height="58" rx="7" class="c-security" stroke-width="1.5"/>
        <text x="710" y="471" class="t-primary" font-size="10" font-weight="600" text-anchor="middle">Cancelled</text>
        <text x="710" y="487" class="t-muted" font-size="7" text-anchor="middle">cascades to subtasks</text>

        <!-- Transition labels -->
        <rect x="293.75" y="136" width="36.5" height="16" rx="4" class="c-mask"/>
        <text x="312" y="147" class="t-backend" font-size="8" text-anchor="middle">lease</text>
        <rect x="625.4" y="196.5" width="100.2" height="16" rx="4" class="c-mask"/>
        <text x="675.5" y="207.5" class="t-muted" font-size="8" text-anchor="middle">spawn · ask · wait</text>
        <rect x="801.95" y="180.5" width="56.1" height="16" rx="4" class="c-mask"/>
        <text x="830" y="191.5" class="t-backend" font-size="8" text-anchor="middle">WakeEvent</text>
        <rect x="458.3" y="389" width="41.400000000000006" height="16" rx="4" class="c-mask"/>
        <text x="479" y="400" class="t-backend" font-size="8" text-anchor="middle">finish</text>
        <rect x="518.15" y="227" width="75.7" height="16" rx="4" class="c-mask"/>
        <text x="556" y="238" class="t-muted" font-size="8" text-anchor="middle">fail / budget</text>
        <rect x="689.3" y="377" width="41.400000000000006" height="16" rx="4" class="c-mask"/>
        <text x="710" y="388" class="t-muted" font-size="8" text-anchor="middle">cancel</text>

        <!-- Legend -->
        <text x="220" y="542" class="t-primary" font-size="10" font-weight="600">Legend</text>
        <rect x="220" y="554" width="14" height="9" rx="2" class="c-backend" stroke-width="1"/>
        <text x="240" y="562" class="t-muted" font-size="7">active state</text>
        <rect x="325" y="554" width="14" height="9" rx="2" class="c-cloud" stroke-width="1"/>
        <text x="345" y="562" class="t-muted" font-size="7">waiting</text>
        <rect x="415" y="554" width="14" height="9" rx="2" class="c-database" stroke-width="1"/>
        <text x="435" y="562" class="t-muted" font-size="7">terminal success</text>
        <rect x="560" y="554" width="14" height="9" rx="2" class="c-security" stroke-width="1"/>
        <text x="580" y="562" class="t-muted" font-size="7">failure / exit</text>
      </svg>