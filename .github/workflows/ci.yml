name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phase0-kernel:
    name: Phase 0 kernel — tests + lint
    runs-on: ubuntu-latest
    services:
      # Live server for the Postgres storage adapters: the storage
      # contract suites run their "postgres" param when
      # NOETA_TEST_POSTGRES_DSN is set (skipped otherwise, e.g. locally
      # without a server).
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      # Build the web frontend BEFORE `uv sync`: noeta-agent's wheel
      # force-includes apps/web/dist (a gitignored Vite artifact), so the
      # editable build triggered by sync fails if dist/ does not yet exist.
      - name: Build web frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Sync workspace (kernel + dev group)
        run: uv sync --frozen

      # Cache the Chromium download (~30 s per run) keyed on the pinned
      # @playwright/test version (the e2e suite is its own npm package under
      # apps/web/e2e); `playwright install` skips the download on a hit, and
      # --with-deps still installs the OS packages.
      - name: Resolve Playwright version
        id: playwright-version
        run: >
          echo "version=$(node -e
          "console.log(require('./apps/web/e2e/package-lock.json').packages['node_modules/@playwright/test'].version)")"
          >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Web e2e (Playwright against the platform in mock mode)
        working-directory: apps/web/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Smoke import
        run: uv run python -c "from noeta.core.engine import Engine; print('import OK')"

      - name: Run pytest with coverage
        # The four PRD-priority modules are gated to >= 90% via per-module
        # coverage thresholds asserted in tests/test_phase0_coverage_gaps.py
        # plus the integration suite. Repo-wide we require >= 85% so a
        # broad regression cannot sneak in.
        env:
          NOETA_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: uv run pytest -n auto --cov=noeta --cov-report=term --cov-fail-under=85

      - name: App suite (noeta-agent platform backend)
        working-directory: apps/noeta-agent
        run: uv run pytest -q

      - name: Web typecheck + unit tests
        working-directory: apps/web
        run: |
          npx tsc -b --noEmit
          npx vitest run

      - name: mypy strict on protocols
        run: |
          MYPYPATH=packages/noeta-runtime uv run mypy --strict \
            --namespace-packages --explicit-package-bases \
            packages/noeta-runtime/noeta/protocols

      - name: Forbidden naming lint
        run: uv run python scripts/lint-naming.py

      - name: Import topology lint (L0..L3)
        run: uv run lint-imports --config .importlinter

  install-smoke:
    name: Fresh-venv install smoke (Phase 2 I3)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build web frontend
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Run install_smoke pytest (fresh venv install paths + help/smoke)
        run: uv run pytest -v -m install_smoke tests/test_install_smoke.py
