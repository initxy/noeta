<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noeta trace</title>
  <script>
    try {
      const theme = localStorage.getItem("noeta-theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.setAttribute("data-theme", theme);
      }
    } catch (error) {}
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/pages/trace/trace.js"></script>
</body>
</html>
