# Noeta documentation site — MkDocs Material + i18n + mkdocstrings
#
# Build:  uv run mkdocs build
# Serve:  uv run mkdocs serve
# Deploy: GitHub Actions (.github/workflows/docs.yml) on push to main
#
# Project pages are served from the /noeta/ subpath on GitHub Pages.
# The i18n plugin serves English at /noeta/ and Chinese at /noeta/zh/
# (suffix mode: *.zh.md files alongside their English counterparts).

site_name: Noeta
site_description: A runtime for long-horizon, task-oriented agents.
site_author: Noeta Contributors
site_url: https://initxy.github.io/noeta/

repo_url: https://github.com/initxy/noeta
repo_name: initxy/noeta

# Copyright shown in the footer.
copyright: Copyright &copy; 2025–2026 Noeta Contributors

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------

theme:
  name: material
  language: en

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  icon:
    repo: fontawesome/brands/github
    logo: material/cube-outline

extra_css:
  - stylesheets/extra.css

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------

plugins:
  - search

  # mkdocs-static-i18n v1.x — suffix mode (e.g. getting-started.zh.md)
  # See: https://github.com/ultrabug/mkdocs-static-i18n
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          nav:
            - Home: index.md
            - Getting Started: getting-started.md
            - Concepts: concepts.md
            - Guides:
                - Your first agent: guides/first-agent.md
                - Custom tools: guides/custom-tool.md
                - Provider swap: guides/provider-swap.md
                - Permission gating: guides/permission-gating.md
                - Sub-agent delegation: guides/subagent-delegation.md
                - MCP connectors: guides/mcp-connectors.md
                - Durable storage: guides/durable-storage.md
                - Writing a custom skill: guides/skills.md
                - Embedding the engine: guides/embed-engine.md
                - Noeta Agent: noeta-agent.md
                - Architecture Deep Dive: noeta-architecture-deep-dive.md
                - Failure Modes: failure-modes.md
                - Daemon / Worker Loop: daemon.md
                - Releasing: releasing.md
            - Tutorials:
                - Build a research agent: tutorials/build-a-research-agent.md
                - CI integration: tutorials/ci-integration.md
            - Reference:
                - API: reference/api/index.md
                - Configuration: reference/configuration.md
                - Tools: reference/tools.md
                - Presets: reference/presets.md
                - HTTP API: reference/http-api.md
                - Glossary: reference/glossary.md
            - Architecture Decisions:
                - Overview: adr/index.md
                - Core model:
                    - Task as the only primitive: adr/task-as-only-primitive.md
                    - Event-sourced truth: adr/event-sourced-truth.md
                    - Single-writer invariant: adr/single-writer-invariant.md
                    - Event origin marker: adr/event-origin-marker.md
                - Engine & execution:
                    - Engine-policy-dataflow: adr/engine-policy-dataflow.md
                    - Worker lease model: adr/worker-lease-model.md
                    - Subtask fan-out and durable wake: adr/subtask-fanout-and-durable-wake.md
                    - Subtask parallel execution: adr/subtask-parallel-execution.md
                    - Background subagent: adr/background-subagent.md
                    - Conversation rewind and file checkpoint: adr/conversation-rewind-and-file-checkpoint.md
                    - Replay-verify tolerance: adr/replay-verify-tolerance.md
                    - Workflow orchestration: adr/workflow-orchestration.md
                - Context & composition:
                    - Unified context supply: adr/unified-context-supply.md
                    - Context compaction: adr/context-compaction.md
                    - Model-driven skill invocation: adr/model-driven-skill-invocation.md
                    - Skill resource on-demand: adr/skill-resource-on-demand.md
                    - Control tools neutral mechanism: adr/control-tools-neutral-mechanism.md
                - Provider & tools:
                    - Provider-neutral: adr/provider-neutral.md
                    - Provider adapters and multimodal: adr/provider-adapters-and-multimodal.md
                    - Tool description canonical: adr/tool-description-canonical.md
                    - Tool and agent catalog: adr/tool-and-agent-catalog.md
                    - MCP connectors: adr/mcp-connectors.md
                    - Transport-neutral fanout: adr/transport-neutral-fanout.md
                - Architecture & packaging:
                    - Library-SDK architecture: adr/library-sdk-architecture.md
                    - Package layout: adr/package-layout.md
                    - Runtime-SDK-app restructure: adr/runtime-sdk-app-restructure.md
                    - Doc-code link direction: adr/doc-code-link-direction.md
                    - Shell permission and background: adr/shell-permission-and-background.md
                - Agent & governance:
