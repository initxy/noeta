  # mkdocstrings — auto-generate API reference from Python docstrings
  # See: https://mkdocstrings.github.io/python/
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [packages/noeta-sdk, packages/noeta-runtime, apps/noeta-agent]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_signature_annotations: true
            separate_signature: true
            line_length: 88
            merge_init_into_class: true
            show_if_no_docstring: false
            filters:
              - "!^_"
              - "^__init__$"

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  - pymdownx.betterem
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.saneheaders
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# ---------------------------------------------------------------------------
# Extra (social links, version info)
# ---------------------------------------------------------------------------

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/initxy/noeta
  generator: false
